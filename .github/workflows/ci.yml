name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  # Fast, deterministic gate: verifies the suite installs, imports, and collects
  # cleanly across the Page Object Model. The live e2e flow is intentionally NOT
  # run in CI — eBay gates automated login with captcha on shared runners, so
  # conftest.py skips login+cart cleanup when CI is set (there is no guest
  # fallback). Run the e2e locally: python -m pytest ... --headed.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Collect tests (import + collection smoke check)
        run: python -m pytest --collect-only -q
