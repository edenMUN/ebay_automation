name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      trace:
        description: "Enable Playwright tracing (--trace-on)"
        type: boolean
        default: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Install Playwright Chromium (with OS deps)
        run: python -m playwright install --with-deps chromium

      # GitHub sets CI=true automatically, so conftest's clear_cart_before_each_test
      # fixture returns immediately — the test runs the search -> add to cart ->
      # budget flow without login/cart cleanup.
      # Tracing is off by default; enable it via the "trace" checkbox when running
      # the workflow manually (Run workflow -> Enable Playwright tracing).
      - name: Run e2e test
        env:
          TRACE_FLAG: ${{ inputs.trace && '--trace-on' || '' }}
        run: >
          python -m pytest src/tests/Test_e2e_add_to_cart.py
          -v --browser chromium
          $TRACE_FLAG
          --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          if-no-files-found: ignore

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: results/
          if-no-files-found: ignore
