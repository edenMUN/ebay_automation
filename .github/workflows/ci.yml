name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  # Gating job: fast, deterministic. Verifies the suite installs, imports,
  # and collects cleanly across the Page Object Model. No live eBay traffic.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Collect tests (import + collection smoke check)
        run: python -m pytest --collect-only -q

  # Best-effort job: drives the live e2e flow headless. eBay gates automated
  # login with captcha on CI runners, so conftest skips login+cart cleanup when
  # CI is set. This job is informational (continue-on-error) and uploads Allure
  # results + Playwright traces for triage — a red run here is not a merge blocker.
  e2e:
    runs-on: ubuntu-latest
    needs: check
    continue-on-error: true
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Install Playwright Chromium (with OS deps)
        run: python -m playwright install --with-deps chromium

      - name: Run e2e test
        run: >
          python -m pytest src/tests/Test_e2e_add_to_cart.py
          -v --browser chromium
          --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          if-no-files-found: ignore

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: results/
          if-no-files-found: ignore
