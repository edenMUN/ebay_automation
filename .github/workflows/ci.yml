name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Static gate only. The live eBay e2e is NOT run here: eBay's anti-bot challenge
# blocks GitHub's datacenter IPs, so a live run in shared CI can only crash, fail,
# or skip — never a trustworthy signal. Run the real flow locally/headed:
#   python -m pytest src/tests/Test_e2e_add_to_cart.py -v --browser chromium --headed
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Syntax check (compile all sources)
        run: python -m compileall -q src run_tests.py

      - name: Collection gate (imports, conftest, fixtures, markers resolve)
        run: python -m pytest --collect-only -q
