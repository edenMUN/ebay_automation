name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * *' # Runs at 02:00 AM Israel time
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Select test type to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ui
          - api
      environment:
        description: 'Select environment'
        required: true
        default: 'DEV'
        type: choice
        options:
          - DEV
          - STAGING

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    env:
      API_KEY: ${{ secrets.API_KEY }}
      ZEROSTEP_TOKEN: ${{ secrets.ZEROSTEP_TOKEN }}
      TEST_ENV: ${{ github.event.inputs.environment || 'DEV' }}

    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: |
        if [ "${{ github.event.inputs.test_type }}" == "ui" ]; then
          npm run test:atidTest
        elif [ "${{ github.event.inputs.test_type }}" == "api" ]; then
          npm run test:api_test
        else
          npm test
        fi

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30